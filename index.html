<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon site académique</title>

    <!-- Style simple -->
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        /* Barre de navigation */
        nav {
            background-color: #333;
            padding: 10px;
        }

        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: #00bcd4;
        }

        /* Section principale */
        .container {
            padding: 40px;
            text-align: center;
        }

        img {
            width: 250px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<!-- Menu -->
<nav>
    <a href="#">Home</a>
    <a href="#">Research</a>
    <a href="#">Teaching</a>
    <a href="#">People</a>
    <a href="#">Contact</a>
</nav>

<!-- Contenu principal -->
<div class="container">
    <h1>Bienvenue sur mon site</h1>

    <!-- Image -->
    <img src="https://via.placeholder.com/250" alt="photo">

    <!-- Texte -->
    <p>
        Bonjour ! Je suis chercheur en XXX.  
        Ce site présente mes travaux, mes projets et mes enseignements.
    </p>
</div>

</body>
</html>
