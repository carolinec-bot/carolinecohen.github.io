<!DOCTYPE html>
<html lang="fr">
    
<head>
<meta charset="UTF-8">
<title>Recherche</title>
    
<link rel="stylesheet" href="style.css">

    
<!-- STYLE spécifique aux onglets -->
<style>
.tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.tabs button {
    padding: 10px;
    border: none;
    background: #ddd;
    cursor: pointer;
}

.tabs button.active {
    background: #1e1e2f;
    color: white;
}

.tab-content {
    display: none;
}

.tab-content.active {
    display: block;
}
</style>

<!-- JAVASCRIPT pour les onglets -->    
<script>
function openTab(tabName, el) {
    let tabs = document.getElementsByClassName("tab-content");
    for (let t of tabs) t.style.display = "none";

    let buttons = document.querySelectorAll(".tabs button");
    buttons.forEach(b => b.classList.remove("active"));

    document.getElementById(tabName).style.display = "block";
    el.classList.add("active");
}
</script>

</head>

<body>


<!-- NAVBAR -->    
<nav>

        <a href="index.html">Accueil</a>

    </div>

    </div>
</nav>

    <button onclick="openTab('sport', this)" class="active">Physique du sport</button>
    <button onclick="openTab('fluides', this)">Mécanique des fluides</button>
    <button onclick="openTab('morpho', this)">Morphogénèse</button>
</div>

<!-- CONTENU SPORT -->
